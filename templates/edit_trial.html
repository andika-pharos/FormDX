{% extends "base.html" %}

{% block title %}Edit Trial - FormDX{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2>Edit Trial</h2>
        <p class="text-muted mb-0">No Formula: <strong>{{ trial.master_batch_id or trial.trial_code }}</strong></p>
    </div>
    <a href="{{ url_for('trial_detail', trial_id=trial.id) }}" class="btn btn-outline-secondary">Batal</a>
</div>

<form method="post" id="edit-trial-form">
    <!-- Header Information -->
    <div class="card mb-4">
        <div class="card-header"><strong>Informasi Trial</strong></div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Tanggal Trial</label>
                    <input type="date" class="form-control" value="{{ trial.trial_date }}" readonly>
                </div>
                <div class="col-md-8">
                    <label class="form-label">Nama Produk *</label>
                    <input type="text" name="project_name" class="form-control uppercase" value="{{ trial.project_name | upper }}" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Ukuran Batch</label>
                    <div class="input-group">
                        <input type="number" step="0.01" name="batch_size_value" class="form-control" value="{{ trial.batch_size_value or 0 }}">
                        <select name="batch_size_unit" class="form-select">
                            <option value="tablet" {% if trial.batch_size_unit == 'tablet' %}selected{% endif %}>tablet</option>
                            <option value="kapsul" {% if trial.batch_size_unit == 'kapsul' %}selected{% endif %}>kapsul</option>
                            <option value="mL" {% if trial.batch_size_unit == 'mL' %}selected{% endif %}>mL</option>
                            <option value="L" {% if trial.batch_size_unit == 'L' %}selected{% endif %}>L</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Scheme</label>
                    <input type="number" name="scheme" class="form-control" value="{{ trial.scheme or 1 }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Tahap</label>
                    <select name="tahap" class="form-select">
                        <option value="F1" {% if trial.tahap == 'F1' %}selected{% endif %}>F1</option>
                        <option value="F2" {% if trial.tahap == 'F2' %}selected{% endif %}>F2</option>
                        <option value="F3" {% if trial.tahap == 'F3' %}selected{% endif %}>F3</option>
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label">Tujuan / Objective</label>
                    <textarea name="objective" class="form-control" rows="2">{{ trial.objective or '' }}</textarea>
                </div>
                <div class="col-12">
                    <label class="form-label">Prosedur</label>
                    <textarea name="procedure" class="form-control" rows="4">{{ trial.procedure or '' }}</textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- Komposisi Bahan Baku -->
    <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong>Komposisi Bahan Baku</strong>
            <button type="button" class="btn btn-outline-primary btn-sm" onclick="addIngredientRow()">
                <i class="bi bi-plus-lg"></i> Tambah Bahan
            </button>
        </div>
        <div class="card-body">
            <div id="ingredient-list"></div>
            <div class="form-check mt-3">
                <input class="form-check-input" type="checkbox" name="update_stock" id="updateStock" checked>
                <label class="form-check-label" for="updateStock">
                    <strong>Update stok otomatis</strong> (sesuaikan Kartu Stok)
                </label>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between">
        <a href="{{ url_for('trial_detail', trial_id=trial.id) }}" class="btn btn-secondary">Batal</a>
        <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
    </div>
</form>

<!-- Hidden data for pre-filling ingredients -->
<script>
let rowIndex = 0;
const existingIngredients = {{ current_ingredients | tojson | safe }};

function addIngredientRow(prefillData = null) {
    const container = document.getElementById('ingredient-list');
    const div = document.createElement('div');
    div.className = 'border rounded p-3 mb-3 bg-light';
    
    const html = `
        <div class="row g-2 align-items-end">
            <div class="col-md-5">
                <label class="form-label small">Cari Bahan Baku</label>
                <input type="text" class="form-control form-control-sm search-input" placeholder="Ketik minimal 2 huruf..." 
                       onkeyup="searchMaterial(this, ${rowIndex})" value="${prefillData ? prefillData.code + ' - ' + prefillData.name : ''}">
                <input type="hidden" name="raw_material_id[]" id="mat_id_${rowIndex}" value="${prefillData ? prefillData.raw_material_id : ''}">
                <div id="search_result_${rowIndex}" class="list-group position-absolute" style="z-index: 1000; max-height: 200px; overflow-y: auto;"></div>
            </div>
            <div class="col-md-2">
                <label class="form-label small">Qty per Satuan</label>
                <input type="number" step="0.001" name="qty_per_small_unit[]" class="form-control form-control-sm" 
                       value="${prefillData ? prefillData.qty_per_small_unit || '' : ''}" required>
            </div>
            <div class="col-md-2">
                <label class="form-label small">Satuan</label>
                <select name="small_unit[]" class="form-select form-select-sm">
                    <option value="mg" ${prefillData && prefillData.small_unit === 'mg' ? 'selected' : ''}>mg</option>
                    <option value="mL" ${prefillData && prefillData.small_unit === 'mL' ? 'selected' : ''}>mL</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small">Fase</label>
                <input type="text" name="phase[]" class="form-control form-control-sm" value="${prefillData ? prefillData.phase || 'Fase Utama' : 'Fase Utama'}">
            </div>
            <div class="col-md-1">
                <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.border').remove()">×</button>
            </div>
        </div>
        <div class="mt-2 lot-container">
            <input type="text" name="lot_number[]" class="form-control form-control-sm" placeholder="No. LSA (opsional)" value="${prefillData ? prefillData.lot_number || '' : ''}">
        </div>
    `;
    
    div.innerHTML = html;
    container.appendChild(div);
    rowIndex++;
}

function searchMaterial(inputElement, index) {
    const query = inputElement.value.trim();
    const resultDiv = document.getElementById('search_result_' + index);
    if (query.length < 2) {
        resultDiv.innerHTML = '';
        return;
    }
    fetch('/api/search_materials?q=' + encodeURIComponent(query))
        .then(res => res.json())
        .then(data => {
            resultDiv.innerHTML = '';
            data.forEach(item => {
                const a = document.createElement('a');
                a.href = '#';
                a.className = 'list-group-item list-group-item-action py-1';
                a.innerHTML = `<strong>${item.code}</strong> - ${item.name} (Stok: ${item.current_stock} ${item.unit})`;
                a.onclick = (e) => {
                    e.preventDefault();
                    inputElement.value = `${item.code} - ${item.name}`;
                    document.getElementById('mat_id_' + index).value = item.id;
                    
                    // Fetch daftar No. LSA untuk bahan ini
                    fetch('/api/material_lots/' + item.id)
                        .then(res => res.json())
                        .then(lots => {
                            const lotContainer = inputElement.closest('.border').querySelector('.lot-container');
                            if (lotContainer) lotContainer.innerHTML = '';

                            if (lots.length > 0) {
                                const select = document.createElement('select');
                                select.name = 'lot_number[]';
                                select.className = 'form-select form-select-sm';
                                
                                const defaultOpt = document.createElement('option');
                                defaultOpt.value = '';
                                defaultOpt.textContent = '-- Pilih No. LSA --';
                                select.appendChild(defaultOpt);

                                lots.forEach(lot => {
                                    const opt = document.createElement('option');
                                    opt.value = lot.lsa_number;
                                    opt.textContent = `${lot.lsa_number} (ED: ${lot.expiry_date || '-'})`;
                                    select.appendChild(opt);
                                });

                                if (lotContainer) {
                                    lotContainer.appendChild(select);
                                }
                            } else {
                                const input = document.createElement('input');
                                input.type = 'text';
                                input.name = 'lot_number[]';
                                input.className = 'form-control form-control-sm';
                                input.placeholder = 'No. LSA (opsional)';
                                if (lotContainer) lotContainer.appendChild(input);
                            }
                        });
                    
                    resultDiv.innerHTML = '';
                };
                resultDiv.appendChild(a);
            });
        });
}

window.onload = function() {
    // Pre-fill existing ingredients
    if (existingIngredients && existingIngredients.length > 0) {
        existingIngredients.forEach(ing => {
            addIngredientRow(ing);
        });
    } else {
        addIngredientRow(); // Add one empty row if no ingredients
    }
}
</script>
{% endblock %}
